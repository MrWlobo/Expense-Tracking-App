<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UFT-8">
        <title>Expense Tracker</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../style/style.css">
    </head>

    <body>
        <nav>Nav</nav>
        <main>
            <div class="center-content" id="charts-panel-center-container">
                <div class="main-content">
                    <h1>Line Chart</h1>
                    <div class="chart-container">
                        <canvas id="chart"></canvas>
                    </div>
                </div>
                <div class="button-group">
                    <a href="../index.html">
                        <button class="button">Home Page</button>
                    </a>
                    <button class="button" id="line-chart-button">Spendings by month</button>
                    <button class="button" id="bar-chart-button">Spendings by category (Bar Chart)</button>
                    <button class="button" id="pie-chart-button">Spendings by category (Pie Chart)</button>
                    <label for="year-selector"></label>
                    <input type="number" id="year-selector" class="input-field" placeholder="Year" autocomplete="off">
                </div>
            </div>
        </main>
        <footer>Expense Tracker 2026</footer>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="../script/chartsPanelScript.js"></script>
    </body>
</html>
