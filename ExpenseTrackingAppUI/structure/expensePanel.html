<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UFT-8">
        <title>Expense Tracker</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../style/style.css">
    </head>

    <body>
        <nav>Nav</nav>
        <main>
            <div class="side-board">
                <p class="title">Recent Expenses</p>
                <ul class="side-board-list" id="recent-expenses-list">
                </ul>
            </div>

            <div class="center-content">
                <h1>Expense Panel</h1>
                <form>
                    <label class="title" for="amount-input">Amount</label>
                    <input type="number" placeholder="0.00" class="input-field" id="amount-input" autocomplete="off" min="0">

                    <label class="title" for="category-id-input">Category ID</label>
                    <input type="number" placeholder="Category" class="input-field" id="category-id-input" autocomplete="off" min="1">

                    <label class="title" for="category-id-input">Comments</label>
                    <textarea class="input-field" id="comments-input" maxlength="500" rows="5" cols="15"></textarea>
                </form>

                <div class="button-group">
                    <a href="../index.html">
                        <button class="button">Home Page</button>
                    </a>
                    <button class="button" id="add-expense-button">Add Expense</button>
                </div>
            </div>

            <div class="side-board">
                <p class="title">Categories with IDs</p>
                <ul class="side-board-list" id="categories-with-ids-list">

                </ul>
            </div>
        </main>
        <footer>Expense Tracker 2026</footer>
        <script src="../script/expenseManagerScript.js"></script>
    </body>
</html>
